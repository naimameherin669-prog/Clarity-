{% extends "base.html" %}
{% block content %}
<section class="card">
  <h2>Media Upload</h2>
  <form method="post" enctype="multipart/form-data" class="form">
    <input type="file" name="file" accept="image/*,video/*" required>
    <button type="submit">Upload</button>
  </form>
</section>

<section class="card">
  <h2>Saved Media</h2>
  <div class="grid">
    {% for item in items %}
      <div class="media-card">
        <div class="media-name">{{ item.original }}</div>
        <a href="{{ item.url }}" target="_blank">Open file</a>
      </div>
    {% endfor %}
  </div>
</section>
{% endblock %}
