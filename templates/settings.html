{% extends "base.html" %}
{% block content %}
<section class="card">
  <h2>Settings</h2>
  <form method="post" class="form">
    <label>AI Engine Selection</label>
    <select name="ai_engine">
      {% for option in ["Gemini", "Perplexity", "Kimi", "Gauth AI", "Studly"] %}
        <option {% if settings.ai_engine == option %}selected{% endif %}>{{ option }}</option>
      {% endfor %}
    </select>

    <label>Gemini API Key</label>
    <input name="api_gemini" value="{{ settings.api_keys.Gemini }}">
    <label>Perplexity API Key</label>
    <input name="api_perplexity" value="{{ settings.api_keys.Perplexity }}">
    <label>Kimi API Key</label>
    <input name="api_kimi" value="{{ settings.api_keys.Kimi }}">
    <label>Gauth AI API Key</label>
    <input name="api_gauth" value="{{ settings.api_keys['Gauth AI'] }}">
    <label>Studly API Key</label>
    <input name="api_studly" value="{{ settings.api_keys.Studly }}">

    <hr>

    <label>Instagram Intervention Message</label>
    <input name="msg_Instagram" value="{{ settings.interventions.Instagram }}">
    <label>TikTok Intervention Message</label>
    <input name="msg_TikTok" value="{{ settings.interventions.TikTok }}">
    <label>YouTube Intervention Message</label>
    <input name="msg_YouTube" value="{{ settings.interventions.YouTube }}">

    <button type="submit">Save Settings</button>
  </form>
</section>
{% endblock %}
