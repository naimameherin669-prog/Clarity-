<!DOCTYPE html>
<html>
<head><meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>body{background:#f5f5f7; font-family:sans-serif; padding:40px; text-align:center;} 
.card{background:white; padding:30px; border-radius:20px; border:1px solid #e5e5e7;}
input, button{width:100%; padding:15px; margin:10px 0; border-radius:10px; border:1px solid #ddd;}
button{background:#1d4ed8; color:white; font-weight:bold; border:none;}</style></head>
<body>
    <a href="/" style="text-decoration:none;color:#1d4ed8;"><- Back</a>
    <div class="card">
        <h2>Log Growth Win</h2>
        <form method="POST">
            <input name="activity" placeholder="What did you achieve?" required>
            <input name="score" type="number" placeholder="Impact (+1 to +10)" required>
            <button type="submit">CLARITY</button>
        </form>
    </div>
</body>
</html>
