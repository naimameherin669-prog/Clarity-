{% extends "base.html" %}
{% block content %}
<section class="card">
  <h2>Alarms</h2>
  <form method="post" class="form">
    <label>Alarm Time</label>
    <input type="time" name="time" value="{{ alarm_settings.time }}">
    <label>Custom Wake-up Message</label>
    <input name="message" value="{{ alarm_settings.message }}" placeholder="Wake up, you have work to do!">
    <label>Music Sequence</label>
    <select name="sequence">
      <option {% if alarm_settings.sequence == 'Message before music' %}selected{% endif %}>Message before music</option>
      <option {% if alarm_settings.sequence == 'Message after music' %}selected{% endif %}>Message after music</option>
      <option {% if alarm_settings.sequence == 'Both' %}selected{% endif %}>Both</option>
    </select>
    <label>Music Source</label>
    <input name="music_link" value="{{ alarm_settings.music_link }}" placeholder="Spotify or Google Drive direct link">
    <button type="submit">Save Alarm</button>
  </form>
</section>

<section class="card">
  <h2>MacroDroid Feed</h2>
  <p class="muted">Use <code>/get_alarm</code> for JSON output.</p>
</section>
{% endblock %}
