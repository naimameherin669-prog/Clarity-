<!DOCTYPE html>
<html>
<head><meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>body{background:#f5f5f7;font-family:sans-serif;text-align:center;padding:10px;margin:0;}
video{width:100%;border-radius:20px;background:black;margin-bottom:15px;}
.rec-btn{width:70px;height:70px;border-radius:50%;background:red;border:5px solid white;box-shadow:0 0 15px rgba(0,0,0,0.2);}</style>
</head>
<body>
    <div style="padding:15px;"><a href="/" style="text-decoration:none;color:#1d4ed8;"><- Back</a></div>
    <h2>Pro High-Res Recorder</h2>
    <video id="preview" autoplay muted playsinline></video>
    <button class="rec-btn" id="recordBtn" onclick="toggleRecord()"></button>
    <p id="status" style="color:#86868b;margin-top:10px;">Idle</p>

    <script>
        let mediaRecorder, chunks = [];
        // Requests the maximum resolution available (4K target)
        navigator.mediaDevices.getUserMedia({ video: { width: 3840, height: 2160 }, audio: true })
            .then(stream => {
                document.getElementById('preview').srcObject = stream;
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = 'clarity_growth_record.webm'; a.click(); // Automatic download to phone
                };
            });

        function toggleRecord() {
            const btn = document.getElementById('recordBtn');
            const status = document.getElementById('status');
            if(mediaRecorder.state === "inactive") {
                mediaRecorder.start();
                btn.style.borderRadius = "10px";
                status.innerText = "RECORDING 4K...";
            } else {
                mediaRecorder.stop();
                btn.style.borderRadius = "50%";
                status.innerText = "Processing Video...";
            }
        }
    </script>
</body>
</html>
