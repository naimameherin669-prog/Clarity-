<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<style>
body { background:#f5f5f7; color:#1d1d1f; font-family:-apple-system,sans-serif; margin:0; padding:0; }
.nav { display:flex; justify-content:space-around; padding:18px 0; background:white; border-bottom:1px solid #e5e5e7; position:sticky; top:0; z-index:100; }
.nav a { color:#1d4ed8; text-decoration:none; font-weight:700; font-size:0.7rem; text-transform:uppercase; letter-spacing:1px; }
.container { padding:20px; max-width:500px; margin:auto; }
.card { background:white; border-radius:22px; padding:25px; box-shadow:0 8px 30px rgba(0,0,0,0.04); margin-bottom:20px; border:1px solid #e5e5e7; text-align:center; }
.score-big { font-size:4.5rem; color:#1d4ed8; font-weight:800; margin:10px 0; }
.label { color:#86868b; font-size:0.75rem; font-weight:600; text-transform:uppercase; letter-spacing:1.5px; }
.btn-row { display:flex; gap:10px; margin-top:15px; }
.btn { flex:1; padding:12px; border-radius:12px; border:none; font-weight:bold; color:white; transition:0.3s; }
.btn-blue { background:#1d4ed8; } .btn-water { background:#00aaff; } .btn-dark { background:#1d1d1f; }
</style>
</head>
<body>
    <div class="nav">
        <a href="/">Dashboard</a>
        <a href="/vault">Vault</a>
        <a href="/recorder">4K Camera</a>
        <a href="/alarm">Alarm</a>
        <a href="/logout">Logout</a>
    </div>
<script>
    // 1. Install the "App" Capability
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
    }

    // 2. Local Independent Water Reminder
    function startWaterReminder() {
        // Asks for permission to send pop-ups
        Notification.requestPermission().then(perm => {
            if (perm === 'granted') {
                alert("Clarity Water Tracker Activated. Reminders every 2 hours.");
                // This runs inside the browser independent of the server!
                setInterval(() => {
                    new Notification("🌊 Drink Water", {
                        body: "Maintain Clarity. Drink 250ml now.",
                        icon: "https://cdn-icons-png.flaticon.com/512/591/591564.png"
                    });
                }, 7200000); // 7200000 ms = 2 hours
            }
        });
    }
</script>

    <div class="container">
        <!-- SCORE -->
        <div class="card">
            <p class="label">CURRENT CLARITY</p>
            <div class="score-big" th:text="${user.score}">0</div>
        </div>

        <!-- WATER (Independent Alert System) -->
        <div class="card" style="border-top:5px solid #00aaff">
            <p class="label">WATER LOG (ML)</p>
            <div style="font-size:2.5rem;color:#00aaff;font-weight:700" th:text="${user.water + 'ml'}">0ml</div>
            <div class="btn-row">
                <form action="/water/add" method="POST" style="flex:1">
                    <button type="submit" class="btn btn-water" style="width:100%">+250ML</button>
                </form>
                <button onclick="startWaterReminders()" class="btn btn-dark">🔔 ALARM</button>
            </div>
        </div>

        <!-- STUDY TRACKER -->
        <div class="card">
            <p class="label">FOCUS TIMER</p>
            <div id="displayTimer" style="font-size:3rem;font-weight:800;margin:10px 0">00:00:00</div>
            <div class="btn-row">
                <button onclick="toggleTimer()" id="mainTimerBtn" class="btn btn-blue">START SESSION</button>
            </div>
        </div>
    </div>

    <script>
    // 1. INDEPENDENT WATER ALERTS (Browser Native)
    function startWaterReminders() {
        Notification.requestPermission().then(p => {
            if (p === 'granted') {
                alert("Independent Clarity Alert Activated: Every 2 Hours");
                setInterval(() => {
                    new Notification("🌊 Clarity Water Engine", {
                        body: "Drink 250ml now to maintain your cognitive edge.",
                        icon: "https://cdn-icons-png.flaticon.com/512/591/591564.png"
                    });
                }, 7200000); 
            }
        });
    }

    // 2. STUDY TIMER LOGIC
    let seconds = 0, timerRunning = false, timerInterval;
    function toggleTimer() {
        const btn = document.getElementById('mainTimerBtn');
        if(!timerRunning) {
            timerRunning = true; btn.innerText = "FINISH & LOG"; btn.style.background = "#ff3b30";
            timerInterval = setInterval(() => {
                seconds++;
                let h=Math.floor(seconds/3600), m=Math.floor((seconds%3600)/60), s=seconds%60;
                document.getElementById('displayTimer').innerText = 
                `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }, 1000);
        } else {
            // STOP AND SEND TO DATABASE
            clearInterval(timerInterval);
            const f = document.createElement('form'); f.method='POST'; f.action='/study/save';
            const i = document.createElement('input'); i.name='seconds'; i.value=seconds;
            f.appendChild(i); document.body.appendChild(f); f.submit();
        }
