<!DOCTYPE html>
<html>
<head><meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>body{background:#f5f5f7;font-family:sans-serif;padding:20px;} 
.card{background:white;padding:30px;border-radius:20px;border:1px solid #e5e5e7;}
input{width:100%;padding:15px;margin:10px 0;border-radius:10px;border:1px solid #ddd;box-sizing:border-box;}
button{width:100%;padding:15px;background:#1d1d1f;color:white;border:none;border-radius:10px;font-weight:bold;}</style></head>
<body>
    <a href="/" style="text-decoration:none;color:#1d4ed8;"><- Back</a>
    <div class="card" style="margin-top:20px;">
        <h2>Sovereign Alarm</h2>
        <form method="POST">
            <input name="msg" placeholder="Insult/Message (e.g. Bitch wake up)">
            <input name="music" placeholder="Spotify or Google Drive Link">
            <button type="submit">SAVE SETTINGS</button>
        </form>
    </div>
</body>
</html>
