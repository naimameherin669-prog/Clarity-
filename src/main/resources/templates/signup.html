<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarity | Signup</title>
    <style>
        body { background:#f5f5f7; color:#1d1d1f; font-family:-apple-system, sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
        .card { background:white; border-radius:25px; padding:40px; width:85%; max-width:350px; box-shadow:0 15px 40px rgba(0,0,0,0.04); border:1px solid #e5e5e7; text-align:center; }
        input { width:100%; padding:15px; margin:10px 0; border-radius:12px; border:1px solid #ddd; outline:none; box-sizing:border-box; }
        button { width:100%; padding:15px; background:#1d4ed8; color:white; border:none; border-radius:12px; font-weight:bold; }
        a { color:#1d4ed8; text-decoration:none; font-size:0.8rem; font-weight:600; display:block; margin-top:20px;}
    </style>
</head>
<body>
    <div class="card">
        <h2>JOIN CLARITY</h2>
        <p style="color:#86868b;font-size:0.9rem">Start your digital ascent.</p>
        <form method="POST">
            <input name="username" placeholder="Username" required>
            <input name="password" type="password" placeholder="Password" required>
            <button type="submit">CREATE MASTER ACCOUNT</button>
        </form>
        <a href="/login">Already have access? Login</a>
    </div>
</body>
</html>
