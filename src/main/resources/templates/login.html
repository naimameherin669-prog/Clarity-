<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarity | Auth</title>
    <style>
        body { background:#f5f5f7; color:#1d1d1f; font-family:-apple-system, sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
        .card { background:white; border-radius:25px; padding:40px; width:85%; max-width:350px; box-shadow:0 15px 40px rgba(0,0,0,0.04); border:1px solid #e5e5e7; text-align:center; }
        .logo { color:#1d4ed8; font-weight:800; font-size:1.8rem; margin-bottom:10px; letter-spacing:-1px; }
        p { color:#86868b; font-size:0.9rem; margin-bottom:30px; }
        input { width:100%; padding:15px; margin:10px 0; border-radius:12px; border:1px solid #ddd; outline:none; font-weight:600; box-sizing:border-box; }
        button { width:100%; padding:15px; background:#1d1d1f; color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer; margin-top:15px; }
        .footer { margin-top:25px; font-size:0.8rem; }
        a { color:#1d4ed8; text-decoration:none; font-weight:bold; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">CLARITY</div>
        <p>ENTER THE CONTROL CENTER</p>
        <form method="POST">
            <input name="username" placeholder="Username" required>
            <input name="password" type="password" placeholder="Password" required>
            <button type="submit">SIGN IN</button>
        </form>
        <div class="footer">No account? <a href="/signup">Sign up</a></div>
    </div>
</body>
</html>
